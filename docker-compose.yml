version: "3.8"

services:
  # Backend NestJS & Agent Engine
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: omnicanvas-backend
    restart: always
    environment:
      - PORT=3000
      - UPLOAD_DIR=/app/files
    volumes:
      - ./server/files:/app/files
      - ./server/data:/app/data
      - ./server/.env:/app/.env
    # Removed backend ports to prevent exposing the NestJS server directly to the public.
    # Nginx web service handles API routing securely via the container network.

  # Web Server (Nginx Proxy for Frontend App & Admin)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnicanvas-web
    restart: always
    ports:
      - "18080:80"
    depends_on:
      - backend
